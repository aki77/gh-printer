<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Printer body -->
  <rect x="16" y="48" width="96" height="56" rx="8" fill="#24292f"/>
  <!-- Paper tray top -->
  <rect x="32" y="24" width="64" height="32" rx="4" fill="#f6f8fa" stroke="#24292f" stroke-width="4"/>
  <!-- Paper coming out bottom -->
  <rect x="36" y="80" width="56" height="36" rx="4" fill="#ffffff" stroke="#d0d7de" stroke-width="3"/>
  <!-- Text lines on paper -->
  <rect x="44" y="88" width="40" height="4" rx="2" fill="#d0d7de"/>
  <rect x="44" y="96" width="32" height="4" rx="2" fill="#d0d7de"/>
  <rect x="44" y="104" width="36" height="4" rx="2" fill="#d0d7de"/>
  <!-- Printer slot -->
  <rect x="24" y="68" width="80" height="6" rx="3" fill="#57606a"/>
  <!-- Printer light -->
  <circle cx="96" cy="60" r="5" fill="#2da44e"/>
</svg>
